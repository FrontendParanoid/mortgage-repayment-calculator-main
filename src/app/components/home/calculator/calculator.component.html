<div class="container">
  <div class="title">
    <h3 class="heading">Mortgage Calculator</h3>
    <p class="clear">Clear All</p>
  </div>
  <div class="mortgage">
    <form [formGroup]="form">
      <div class="form-group">
        <label for="mortgageAmount">Mortgage Amount</label>
        <div class="input-group" appCustomInput>
          <input type="number" name="mortgageAmount" formControlName="amount" />
          <span class="icon-left-side">&euro;</span>
        </div>
      </div>
      <div class="flex-form-group">
        <div class="form-group">
          <label for="mortgageTerm">Mortgage Term</label>
          <div class="input-group" appCustomInput>
            <input
              type="number"
              name="mortgageTerm"
              class="mortgage-term-input"
              formControlName="term"
            />
            <span class="icon-right-side">years</span>
          </div>
        </div>
        <div class="form-group">
          <label for="mortgageInterest">Mortgage Interest</label>
          <div class="input-group" appCustomInput>
            <input
              type="number"
              name="mortgageInterest"
              formControlName="interest"
            />
            <span class="icon-right-side">%</span>
          </div>
        </div>
      </div>
      <div class="form-group-checkbox">
        <div class="subtitle">
          <p>Mortgage Type</p>
        </div>
        <label for="repayment">
          <input id="repayment" type="radio" name="type" />
          <span>Repayment</span>
        </label>
        <label for="interestOnly">
          <input id="interestOnly" type="radio" name="type" />
          <span>Interest Only</span>
        </label>
      </div>
      <div class="btns">
        <button class="submit" type="submit">
          <img src="/images/icon-calculator.svg" />
          Calculate Repayments
        </button>
      </div>
    </form>
  </div>
</div>
